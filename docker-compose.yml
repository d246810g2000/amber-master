services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DB:-amber_db}
      MYSQL_USER: ${MYSQL_USER:-amber_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-amber_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql

  # 開發用的資料庫 (Local Dev Database)
  db-dev:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DB_DEV:-amber_db_dev}
      MYSQL_USER: ${MYSQL_USER:-amber_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-amber_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data_dev:/var/lib/mysql
      - ./backend/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql

  # 開發用的後端 API (Local Dev API)
  api-dev:
    build: ./backend
    restart: always
    environment:
      MYSQL_USER: ${MYSQL_USER:-amber_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-amber_password}
      MYSQL_HOST: db-dev
      MYSQL_DB: ${MYSQL_DB_DEV:-amber_db_dev}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    ports:
      - "8001:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    depends_on:
      - db-dev

  api:
    build: ./backend
    restart: always
    environment:
      MYSQL_USER: ${MYSQL_USER:-amber_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-amber_password}
      MYSQL_HOST: db
      MYSQL_DB: ${MYSQL_DB:-amber_db}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    depends_on:
      - db

  # 正式版前端 (Production)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-/amber-master/api}
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
    ports:
      - "8080:80"
    environment:
      - BACKEND_HOST=api
      - BACKEND_PORT=8000
    restart: always

  # 開發版前端 (Development)
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-/amber-master/api}
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
    ports:
      - "8081:80"
    environment:
      - BACKEND_HOST=api-dev
      - BACKEND_PORT=8000
    restart: always

volumes:
  mysql_data:
  mysql_data_dev:
